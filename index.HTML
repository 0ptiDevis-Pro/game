<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.N.I.P.E.R. - Tactical Aim Trainer</title>
    <style>
        :root {
            --bg-color: #05080c;
            --accent-cyan: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --target-red: #ff3366;
            --target-glow: rgba(255, 51, 102, 0.5);
            --penalty-orange: #ff5500;
            --ui-bg: rgba(10, 16, 26, 0.9);
            --border-style: 1px solid rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            cursor: none; /* Masque le curseur système */
        }

        /* Grille tactique */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* --- ÉCRANS MENUS (LOBBY / GAME OVER) --- */
        .screen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 6, 10, 0.95);
            backdrop-filter: blur(15px);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            cursor: default;
        }

        .screen-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
        }

        .menu-card {
            background: var(--ui-bg);
            border: var(--border-style);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .menu-card h1 {
            color: #fff;
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-label {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .time-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 35px;
        }

        .time-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-btn:hover, .time-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-glow);
            border-color: var(--accent-cyan);
        }

        .primary-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .primary-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* --- INTERFACE DE JEU (HUD) --- */
        .hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hud-panel {
            background: var(--ui-bg);
            border: var(--border-style);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 10px;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-width: 160px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-glow);
            margin-top: 2px;
        }

        .streak-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 200px;
        }

        .multiplier-badge {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, var(--target-red), var(--penalty-orange));
            padding: 6px 16px;
            border-radius: 6px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .multiplier-badge.active {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        /* --- BLOQUEUR DE PÉNALITÉ (SURCHAUFFE) --- */
        .penalty-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 30, 0, 0.15); 
            z-index: 400; 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.2s ease;
        }

        .penalty-overlay.active {
            opacity: 1;
            pointer-events: auto; 
            cursor: none;
        }

        .penalty-box {
            background: #140805;
            border: 1px solid var(--penalty-orange);
            padding: 30px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 85, 0, 0.3);
            transform: translateY(15px);
            transition: transform 0.25s ease;
        }

        .penalty-overlay.active .penalty-box {
            transform: translateY(0);
        }

        .penalty-title {
            color: var(--penalty-orange);
            font-size: 13px;
            letter-spacing: 4px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .penalty-timer {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .penalty-progress {
            width: 100%;
            height: 4px;
            background: rgba(255, 85, 0, 0.15);
            margin-top: 15px;
            border-radius: 2px;
            overflow: hidden;
        }

        .penalty-bar {
            height: 100%;
            width: 100%;
            background: var(--penalty-orange);
            transform-origin: left;
            transform: scaleX(1);
        }

        /* --- ZONE DE JEU, CIBLE & VISEUR --- */
        .game-space {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .target {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 15%, transparent 20%, var(--target-red) 25%, transparent 35%, var(--target-red) 65%);
            box-shadow: 0 0 30px var(--target-glow);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .target.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .crosshair {
            position: fixed;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 600; 
            mix-blend-mode: difference;
        }

        .crosshair.disrupted .circle,
        .crosshair.disrupted .dot,
        .crosshair.disrupted .line {
            border-color: var(--penalty-orange) !important;
            background: var(--penalty-orange) !important;
            opacity: 0.5;
        }

        .crosshair .circle {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 34px;
            height: 34px;
            border: 1.5px solid var(--accent-cyan);
            border-radius: 50%;
        }

        .crosshair .dot {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 2px;
            height: 2px;
            background: var(--accent-cyan);
        }

        .crosshair .line { position: absolute; background: var(--accent-cyan); }
        .crosshair .line.v { width: 1.5px; height: 8px; left: 24.25px; }
        .crosshair .line.h { width: 8px; height: 1.5px; top: 24.25px; }
        .crosshair .line.top { top: 0; }
        .crosshair .line.bottom { bottom: 0; }
        .crosshair .line.left { left: 0; }
        .crosshair .line.right { right: 0; }

        .flash {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.08);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }
        .flash.fire { animation: weapon-flash 0.1s ease-out; }
        @keyframes weapon-flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        .hit-ripple {
            position: absolute;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: rip 0.35s ease-out forwards;
        }
        @keyframes rip { to { width: 90px; height: 90px; transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div id="flash" class="flash"></div>

    <div id="setup-screen" class="screen-overlay">
        <div class="menu-card">
            <h1>S.N.I.P.E.R. Suite</h1>
            <div class="menu-label">Durée de la simulation</div>
            <div class="time-selector">
                <button class="time-btn active" data-time="60">1 Min</button>
                <button class="time-btn" data-time="120">2 Min</button>
                <button class="time-btn" data-time="180">3 Min</button>
                <button class="time-btn" data-time="300">5 Min</button>
            </div>
            <button id="start-btn" class="primary-btn">Lancer l'exercice</button>
        </div>
    </div>

    <div id="gameover-screen" class="screen-overlay hidden">
        <div class="menu-card">
            <h1>Exercice Terminé</h1>
            <div class="menu-label">Score Final</div>
            <div id="final-score" class="hud-value" style="font-size: 38px; margin-bottom: 20px;">00000</div>
            <div class="menu-label">Série Maximale : <span id="final-streak" style="color: #fff; font-weight: bold;">0</span></div>
            <button id="restart-btn" class="primary-btn" style="margin-top: 20px;">Retour au Menu</button>
        </div>
    </div>

    <div id="penalty-screen" class="penalty-overlay">
        <div class="penalty-box">
            <div class="penalty-title">Système Enrayé / Surchauffe</div>
            <div id="penalty-timer" class="penalty-timer">5.0s</div>
            <div class="penalty-progress">
                <div id="penalty-bar" class="penalty-bar"></div>
            </div>
        </div>
    </div>

    <div class="hud-layer">
        <div class="hud-header">
            <div class="hud-panel">
                <span class="menu-label" style="margin:0;">Temps Restant</span>
                <div id="hud-timer" class="hud-value">00:00</div>
            </div>
            <div class="streak-container">
                <div id="streak-badge" class="multiplier-badge">X1</div>
            </div>
            <div class="hud-panel" style="text-align: right;">
                <span class="menu-label" style="margin:0;">Score Actuel</span>
                <div id="hud-score" class="hud-value">00000</div>
            </div>
        </div>
        <div class="footer-text">Clic Gauche / Pavé Tactile / Touche Entrée pour faire feu</div>
    </div>

    <div id="game-space" class="game-space">
        <div id="target" class="target"></div>
    </div>

    <div id="crosshair" class="crosshair">
        <div class="circle"></div>
        <div class="dot"></div>
        <div class="line v top"></div>
        <div class="line v bottom"></div>
        <div class="line h left"></div>
        <div class="line h right"></div>
    </div>

    <script>
        // États de jeu globaux
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let multiplier = 1;
        let gameTimeAllocated = 60; 
        let timeLeft = 0;
        
        let gameTimerInterval = null;
        let penaltyInterval = null;
        
        let isGameActive = false;
        let isPenalized = false;
        
        let mouseX = 0;
        let mouseY = 0;

        // Éléments DOM
        const crosshair = document.getElementById('crosshair');
        const target = document.getElementById('target');
        const gameSpace = document.getElementById('game-space');
        const flash = document.getElementById('flash');
        
        const setupScreen = document.getElementById('setup-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const penaltyScreen = document.getElementById('penalty-screen');
        const penaltyTimerText = document.getElementById('penalty-timer');
        const penaltyBar = document.getElementById('penalty-bar');

        const hudScore = document.getElementById('hud-score');
        const hudTimer = document.getElementById('hud-timer');
        const streakBadge = document.getElementById('streak-badge');
        const finalScoreText = document.getElementById('final-score');
        const finalStreakText = document.getElementById('final-streak');

        // Suivi ultra-fluide des coordonnées de la souris
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            requestAnimationFrame(() => {
                crosshair.style.left = `${mouseX}px`;
                crosshair.style.top = `${mouseY}px`;
            });
        });

        // Sélection de la durée initiale
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameTimeAllocated = parseInt(btn.getAttribute('data-time'));
            });
        });

        document.getElementById('start-btn').addEventListener('click', () => startGame());
        document.getElementById('restart-btn').addEventListener('click', () => {
            gameoverScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        });

        /* --- SYSTÈME HORLOGE & INITIALISATION --- */
        function startGame() {
            clearInterval(gameTimerInterval);
            clearInterval(penaltyInterval);
            
            score = 0;
            streak = 0;
            maxStreak = 0;
            multiplier = 1;
            timeLeft = gameTimeAllocated;
            isPenalized = false;
            isGameActive = true;

            updateHudDisplay();
            updateTimerText();
            
            setupScreen.classList.add('hidden');
            penaltyScreen.classList.remove('active');
            crosshair.classList.remove('disrupted');

            // Lancement du VRAI Chronomètre isolé
            gameTimerInterval = setInterval(() => {
                if (isGameActive) {
                    timeLeft--;
                    updateTimerText();
                    
                    if (timeLeft <= 0) {
                        endGame();
                    }
                }
            }, 1000);

            moveTarget();
        }

        function updateTimerText() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            hudTimer.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function moveTarget() {
            if (!isGameActive || isPenalized) return;
            
            target.classList.remove('active');
            
            // CONFIGURATION DE LA ZONE D'EXCLUSION DU HUD
            const paddingSide = 60; // Marge pour les côtés droit, gauche et bas
            const hudSafeZone = 150; // On interdit l'apparition dans les 150px du haut (où se trouvent le chrono, score et bonus)
            
            const minX = paddingSide;
            const maxX = window.innerWidth - paddingSide;
            const minY = hudSafeZone; 
            const maxY = window.innerHeight - paddingSide;
            
            // Calcul restreint pour protéger l'interface utilisateur
            const randomX = Math.floor(Math.random() * (maxX - minX)) + minX;
            const randomY = Math.floor(Math.random() * (maxY - minY)) + minY;

            setTimeout(() => {
                if (!isGameActive || isPenalized) return;
                target.style.left = `${randomX}px`;
                target.style.top = `${randomY}px`;
                target.classList.add('active');
            }, 60);
        }

        /* --- ÉCOUTEURS ET RECONNAISSANCE DES TIRS --- */
        function processShot(e, isKeyboard = false) {
            if (!isGameActive || isPenalized) return;
            if (e && e.target.closest('.screen-overlay')) return; 

            flash.classList.remove('fire');
            void flash.offsetWidth; 
            flash.classList.add('fire');

            let hitTarget = false;
            let posX = mouseX;
            let posY = mouseY;

            if (isKeyboard) {
                const elementAtCursor = document.elementFromPoint(mouseX, mouseY);
                if (elementAtCursor === target) hitTarget = true;
            } else {
                if (e.target === target) hitTarget = true;
                posX = e.clientX;
                posY = e.clientY;
            }

            if (hitTarget) {
                handleHit(posX, posY);
            } else {
                handleMiss();
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (isGameActive && !isPenalized) {
                e.stopPropagation();
                processShot(e, false);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && isGameActive && !isPenalized) {
                processShot(null, true);
            }
        });

        /* --- COMMANDES DE HIT ET DE MISS --- */
        function handleHit(x, y) {
            streak++;
            if (streak > maxStreak) maxStreak = streak;

            if (streak >= 15) multiplier = 4;
            else if (streak >= 10) multiplier = 3;
            else if (streak >= 5) multiplier = 2;
            else multiplier = 1;

            score += (100 * multiplier);
            updateHudDisplay();

            const ripple = document.createElement('div');
            ripple.classList.add('hit-ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 350);

            moveTarget();
        }

        function handleMiss() {
            streak = 0;
            multiplier = 1;
            updateHudDisplay();
            triggerPenaltyBlock();
        }

        /* --- VERROUILLAGE PHYSIQUE ET VISUEL DE PÉNALITÉ --- */
        function triggerPenaltyBlock() {
            isPenalized = true;
            target.classList.remove('active');
            crosshair.classList.add('disrupted');
            penaltyScreen.classList.add('active'); 

            let penaltyTimeLeft = 5.0;
            penaltyTimerText.textContent = `${penaltyTimeLeft.toFixed(1)}s`;
            
            penaltyBar.style.transition = 'none';
            penaltyBar.style.transform = 'scaleX(1)';
            void penaltyBar.offsetWidth; 
            penaltyBar.style.transition = 'transform 5000ms linear';
            penaltyBar.style.transform = 'scaleX(0)';

            clearInterval(penaltyInterval);
            penaltyInterval = setInterval(() => {
                penaltyTimeLeft -= 0.1;
                if (penaltyTimeLeft <= 0) {
                    clearInterval(penaltyInterval);
                    endPenaltyBlock();
                } else {
                    penaltyTimerText.textContent = `${Math.max(0, penaltyTimeLeft).toFixed(1)}s`;
                }
            }, 100);
        }

        function endPenaltyBlock() {
            isPenalized = false;
            penaltyScreen.classList.remove('active'); 
            crosshair.classList.remove('disrupted');
            if (isGameActive) {
                moveTarget();
            }
        }

        function updateHudDisplay() {
            hudScore.textContent = String(score).padStart(5, '0');
            
            if (multiplier > 1) {
                streakBadge.textContent = `X${multiplier} (${streak} SÉRIE)`;
                streakBadge.className = 'multiplier-badge active';
            } else {
                streakBadge.className = 'multiplier-badge';
            }
        }

        function endGame() {
            isGameActive = false;
            clearInterval(gameTimerInterval);
            clearInterval(penaltyInterval);
            
            target.classList.remove('active');
            penaltyScreen.classList.remove('active');
            crosshair.classList.remove('disrupted');
            
            finalScoreText.textContent = String(score).padStart(5, '0');
            finalStreakText.textContent = maxStreak;
            
            gameoverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
