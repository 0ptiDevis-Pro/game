<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.N.I.P.E.R. - Aim Trainer Premium</title>
    <style>
        :root {
            --bg-color: #080b10;
            --accent-color: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --target-color: #ff3366;
            --target-glow: rgba(255, 51, 102, 0.6);
            --ui-panel-bg: rgba(12, 19, 30, 0.75);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Masque le curseur par défaut pour le remplacer par le viseur */
            cursor: none; 
        }

        /* Arrière-plan style maillage tactique */
        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Interface Utilisateur (UI) */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Laisse passer les clics */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--ui-panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: fit-content;
            margin: 0 auto;
        }

        .game-title {
            color: #ffffff;
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: 800;
            margin-right: 40px;
            text-transform: uppercase;
            border-right: 2px solid var(--accent-color);
            padding-right: 40px;
        }

        .score-box {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #score {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Cible */
        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--target-color) 20%, transparent 25%, var(--target-color) 30%, transparent 35%, var(--target-color) 70%);
            box-shadow: 0 0 25px var(--target-glow);
            z-index: 5;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .target.active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Animation d'impact lors du tir réussi */
        .hit-effect {
            position: absolute;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple 0.4s ease-out forwards;
        }

        @keyframes ripple {
            to {
                width: 120px;
                height: 120px;
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        /* Viseur de Sniper personnalisé */
        .crosshair {
            position: fixed;
            width: 60px;
            height: 60px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference; /* Permet de rester visible sur n'importe quel fond */
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: var(--accent-color);
        }

        /* Cercle du viseur */
        .crosshair .circle {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 36px;
            height: 36px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* Point central */
        .crosshair .dot {
            position: absolute;
            top: 28px;
            left: 28px;
            width: 4px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 50%;
        }

        /* Lignes du viseur (Top, Bottom, Left, Right) */
        .crosshair .line {
            position: absolute;
            background: var(--accent-color);
        }
        .crosshair .line.v { width: 2px; height: 10px; left: 29px; }
        .crosshair .line.h { width: 10px; height: 2px; top: 29px; }
        .crosshair .line.top { top: 0; }
        .crosshair .line.bottom { bottom: 0; }
        .crosshair .line.left { left: 0; }
        .crosshair .line.right { right: 0; }

        /* Effet de flash lors du tir */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }

        .flash.fire {
            animation: flash-animation 0.15s ease-out;
        }

        @keyframes flash-animation {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Instructions discrètes en bas */
        .footer-panel {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="background-grid"></div>
    <div id="flash-screen" class="flash"></div>

    <div class="ui-layer">
        <div class="header-panel">
            <div class="game-title">Tactical Training Suite</div>
            <div class="score-box">SCORE: <span id="score">000</span></div>
        </div>
        <div class="footer-panel">
            Clic gauche ou Touche Entrée pour faire feu
        </div>
    </div>

    <div id="target" class="target"></div>

    <div id="crosshair" class="crosshair">
        <div class="circle"></div>
        <div class="dot"></div>
        <div class="line v top"></div>
        <div class="line v bottom"></div>
        <div class="line h left"></div>
        <div class="line h right"></div>
    </div>

    <script>
        const crosshair = document.getElementById('crosshair');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const flashScreen = document.getElementById('flash-screen');

        let score = 0;
        let mouseX = 0;
        let mouseY = 0;

        // Mise à jour de la position du viseur premium
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Utilisation de requestAnimationFrame pour une fluidité maximale (60fps+)
            requestAnimationFrame(() => {
                crosshair.style.left = `${mouseX}px`;
                crosshair.style.top = `${mouseY}px`;
            });
        });

        // Fonction pour déplacer la cible aléatoirement
        function moveTarget() {
            target.classList.remove('active');
            
            // On garde une marge de 10% sur les bords pour éviter que la cible sorte de l'écran
            const padding = 100;
            const maxX = window.innerWidth - padding;
            const maxY = window.innerHeight - padding;
            
            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Petit délai pour l'animation de disparition/réapparition
            setTimeout(() => {
                target.style.left = `${randomX}px`;
                target.style.top = `${randomY}px`;
                target.classList.add('active');
            }, 50);
        }

        // Effet visuel du tir (Flash d'écran)
        function triggerShootEffect() {
            flashScreen.classList.remove('fire');
            void flashScreen.offsetWidth; // Astuce pour reset l'animation CSS
            flashScreen.classList.add('fire');
        }

        // Gestion du tir réussi (Hit)
        function handleHit(x, y) {
            score += 100;
            // Formatage du score façon jeu d'arcade (ex: 00700)
            scoreDisplay.textContent = String(score).padStart(3, '0');
            
            // Création de l'effet d'impact circulaire
            const ripple = document.createElement('div');
            ripple.classList.add('hit-effect');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);
            
            // Nettoyage de l'élément d'effet après animation
            setTimeout(() => ripple.remove(), 400);

            moveTarget();
        }

        // Tir via CLIC SOURIS / PAVÉ TACTILE
        document.addEventListener('mousedown', (e) => {
            triggerShootEffect();
            
            // On vérifie si l'élément cliqué est bien la cible
            if (e.target === target) {
                handleHit(e.clientX, e.clientY);
            }
        });

        // Tir via TOUCHE ENTRÉE
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                triggerShootEffect();

                // On récupère l'élément situé exactement sous le viseur au moment de la frappe
                const elementAtCursor = document.elementFromPoint(mouseX, mouseY);
                
                if (elementAtCursor === target) {
                    handleHit(mouseX, mouseY);
                }
            }
        });

        // Initialisation du premier objectif
        moveTarget();
    </script>
</body>
</html>
